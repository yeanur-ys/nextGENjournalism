version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: nextgen-postgres
    environment:
      POSTGRES_DB: nextgen
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgen -d nextgen"]
      interval: 5s
      timeout: 5s
      retries: 5
  neo4j:
    image: neo4j:5.20-community
    container_name: nextgen-neo4j
    environment:
      NEO4J_AUTH: neo4j/nextgen_dev
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7687:7687" # Bolt
      - "7474:7474" # Browser / Web UI
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: nextgen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # NOTE: not used until Sprint 3 (leaderboard). Included now so the
    # compose file doesn't change shape mid-project.
  api:
    build:
      context: ./apps/api
    container_name: nextgen-api
    env_file:
      - .env
    environment:
      POSTGRES_DSN: "postgres://nextgen:nextgen_dev@postgres:5432/nextgen?sslmode=disable"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "nextgen_dev"
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
