services:
  postgres:
    image: postgres:15-alpine
    container_name: nextgen-postgres
    environment:
      POSTGRES_DB: nextgen
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgen -d nextgen"]
      interval: 5s
      timeout: 5s
      retries: 5
  neo4j:
    image: neo4j:5.20-community
    container_name: nextgen-neo4j
    environment:
      NEO4J_AUTH: neo4j/nextgen_dev
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7687:7687" # Bolt
      - "7474:7474" # Browser / Web UI
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: nextgen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # NOTE: not used until Sprint 3 (leaderboard). Included now so the
    # compose file doesn't change shape mid-project.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: nextgen-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: nextgen-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  debezium:
    image: debezium/connect:2.7
    container_name: nextgen-debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      ENABLE_DEBEZIUM_SCRIPTING: "true"
  api:
    build:
      context: ./apps/api
    container_name: nextgen-api
    env_file:
      - .env
    environment:
      POSTGRES_DSN: "postgres://nextgen:nextgen_dev@postgres:5432/nextgen?sslmode=disable"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "nextgen_dev"
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
  web:
    build:
      context: ./apps/web
    container_name: nextgen-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
