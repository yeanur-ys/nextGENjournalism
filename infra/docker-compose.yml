version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nextgen
      POSTGRES_USER: nextgen
      POSTGRES_PASSWORD: nextgen
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    volumes:
      - ./kafka/server.properties:/opt/bitnami/kafka/config/server.properties

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/conf/neo4j.conf:/conf/neo4j.conf
