name: Backend CI

on:
  push:
    paths:
      - "apps/go-backend/**"
      - "apps/python-worker/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "apps/go-backend/**"
      - "apps/python-worker/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  go-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
        working-directory: apps/go-backend

  python-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        working-directory: apps/python-worker
      - run: python -m py_compile src/main.py src/louvain.py src/config.py
        working-directory: apps/python-worker
